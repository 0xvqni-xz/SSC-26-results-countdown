<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC 2026 Result Countdown</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">

<div class="container">

<h1>SSC 2026 Results</h1>

<h2>Countdown to 20 July 2026</h2>

<div id="countdown">

<div class="box">
<span id="days">00</span>
<p>Days</p>
</div>

<div class="box">
<span id="hours">00</span>
<p>Hours</p>
</div>

<div class="box">
<span id="minutes">00</span>
<p>Minutes</p>
</div>

<div class="box">
<span id="seconds">00</span>
<p>Seconds</p>
</div>

</div>

<p id="message"></p>

</div>

</div>

<audio controls loop>
    <source src="assets/music/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
